<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yuna's Shop — Boutique</title>

    <!-- ── Firebase SDK ── -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        /* ====================================================
           DESIGN SYSTEM — Yuna's Shop
           ==================================================== */

        :root {
            --beige-nude:    #EFE6DD;
            --rose-poudre:   #E8C1C1;
            --blanc-casse:   #FDFBF8;
            --taupe:         #A6968B;
            --noir-doux:     #2D2926;

            --bg-primary:    var(--blanc-casse);
            --bg-secondary:  var(--beige-nude);
            --bg-card:       #FFFFFF;
            --text-primary:  var(--noir-doux);
            --text-secondary:var(--taupe);
            --border-light:  rgba(166, 150, 139, 0.2);
            --shadow-card:   0 2px 20px rgba(45, 41, 38, 0.06);

            --space-sm:  0.5rem;
            --space-md:  1rem;
            --space-lg:  1.5rem;
            --space-xl:  2rem;
            --radius-lg: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ── Header ── */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(253, 251, 248, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-light);
            padding: var(--space-md) var(--space-lg);
            text-align: center;
        }

        .header__title {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .header__title span {
            font-weight: 600;
            color: var(--rose-poudre);
        }

        .header__tagline {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--taupe);
            margin-top: 4px;
        }

        /* ── Grille de produits ── */
        .products-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-md);
        }

        @media (min-width: 768px) {
            .products-grid { grid-template-columns: repeat(4, 1fr); }
        }

        /* ── Carte Produit ── */
        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-card);
            display: flex;
            flex-direction: column;
        }

        .product-card__image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 125%;
            background: var(--beige-nude);
        }

        .product-card__image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-card__info {
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .product-card__name {
            font-size: 0.85rem;
            font-weight: 400;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-card__price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--noir-doux);
            margin-top: auto;
        }

        .status-message {
            text-align: center;
            padding: var(--space-xl);
            color: var(--taupe);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header class="header">
        <h1 class="header__title">Yuna's <span>Shop</span></h1>
        <p class="header__tagline">Mode · Élégance · Curated</p>
    </header>

    <main class="products-section">
        <div id="loadingState" class="status-message">
            Chargement de la collection...
        </div>
        <div id="productsGrid" class="products-grid" style="display:none;">
            <!-- Les produits apparaîtront ici -->
        </div>
    </main>

    <script>
        // 1. Tes clés Firebase officielles
        const firebaseConfig = {
            apiKey: "AIzaSyBn2UV3ilolO7Rqj2bo4dm_vQsn3v_6Ia4",
            authDomain: "yunas-shop-app.firebaseapp.com",
            projectId: "yunas-shop-app",
            storageBucket: "yunas-shop-app.firebasestorage.app",
            messagingSenderId: "584178390864",
            appId: "1:584178390864:web:479d59a10196ece1793e55"
        };

        // 2. Connexion à la base de données
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 3. Récupération des éléments HTML
        const grid = document.getElementById('productsGrid');
        const loading = document.getElementById('loadingState');

        // 4. Lecture de la collection "produits"
        db.collection("produits").get().then((querySnapshot) => {
            loading.style.display = 'none'; // Cacher le message de chargement
            grid.style.display = 'grid';    // Afficher la grille

            if (querySnapshot.empty) {
                grid.innerHTML = "<p class='status-message'>Le catalogue est en cours de préparation.</p>";
                return;
            }

            // Création d'une carte pour chaque article trouvé dans la base
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Image par défaut si l'article n'en a pas encore
                const imageUrl = data.image ? data.image : 'https://placehold.co/300x400/EFE6DD/A6968B?text=Yuna%27s+Shop';
                // Nom et prix
                const nomArticle = data.nom ? data.nom : 'Article sans nom';
                const prixArticle = data.prix ? data.prix + ' DA' : 'Prix sur demande';

                const articleHTML = `
                    <div class="product-card">
                        <div class="product-card__image-wrapper">
                            <img src="${imageUrl}" alt="${nomArticle}" class="product-card__image">
                        </div>
                        <div class="product-card__info">
                            <h3 class="product-card__name">${nomArticle}</h3>
                            <p class="product-card__price">${prixArticle}</p>
                        </div>
                    </div>
                `;
                grid.innerHTML += articleHTML;
            });
        }).catch((error) => {
            console.error("Erreur : ", error);
            loading.innerHTML = "Une erreur est survenue lors de la connexion au catalogue.";
        });
    </script>

</body>
</html>
