<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yuna’s Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Palette Yuna's Shop */
        :root {
            --beige-nude: #EFE6DD;
            --rose-poudre: #E8C1C1;
            --blanc-casse: #FDFBF8;
            --taupe-clair: #A6968B;
            --noir-doux: #2D2926;
        }
        body { background-color: var(--blanc-casse); color: var(--noir-doux); font-family: 'Segoe UI', sans-serif; }
        .bg-custom-nude { background-color: var(--beige-nude); }
        .text-custom-rose { color: var(--rose-poudre); }
        .text-custom-taupe { color: var(--taupe-clair); }
    </style>
</head>
<body>
    <header class="p-8 text-center border-b border-stone-200">
        <h1 class="text-3xl font-light tracking-widest uppercase text-custom-rose">Yuna’s Shop</h1>
        <p class="text-sm text-custom-taupe mt-2">Élégance & Sélection</p>
    </header>

    <main class="p-4 grid grid-cols-2 gap-4">
        <!-- Exemple produit -->
        <div class="bg-white rounded-xl shadow-sm border border-stone-100 overflow-hidden">
            <div class="h-48 bg-custom-nude flex items-center justify-center text-custom-taupe">Photo</div>
            <div class="p-3">
                <h2 class="text-[12px] font-medium text-stone-800">Article Exemple</h2>
                <p class="text-sm font-bold text-custom-taupe mt-1">0000 DA</p>
            </div>
        </div>
    </main>
</body>
</html>
